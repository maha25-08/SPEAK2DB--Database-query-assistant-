{% extends "librarian/base_librarian.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">
                        <i class="fas fa-tools me-2"></i>{{ title }}
                    </h4>
                </div>
                <div class="card-body text-center">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle me-2"></i>
                        {{ message }}
                    </div>
                    
                    <div class="mt-4">
                        <h5>Coming Soon!</h5>
                        <p>This feature is currently under development and will be available in a future update.</p>
                        
                        <div class="mt-3">
                            <a href="{{ url_for('librarian.librarian_dashboard') }}" class="btn btn-primary">
                                <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
